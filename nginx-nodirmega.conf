# nodirmega.uz — Admin panel (dist)
# Qo‘yish: sudo cp nginx-nodirmega.conf /etc/nginx/sites-available/nodirmega.uz
#         sudo ln -s /etc/nginx/sites-available/nodirmega.uz /etc/nginx/sites-enabled/
#         sudo nginx -t && sudo systemctl reload nginx
# SSL (Let's Encrypt): sudo certbot --nginx -d nodirmega.uz

server {
    listen 80;
    listen [::]:80;
    server_name nodirmega.uz www.nodirmega.uz;

    root /home/ubuntu/mega-market/admin-panel/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Xavfsizlik
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
